<!DOCTYPE html>
<style>
  #loader{
    position:fixed;
    inset:0;
    background:#0f0f0f; /* Same as your site */
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99999;
    transition:opacity .4s ease;
}

#loader.hide{
    opacity:0;
    pointer-events:none;
}

.spinner{
    width:60px;
    height:60px;
    border:5px solid #333;
    border-top:5px solid #ff2e63;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}
</style>
<html>
<head>
  <meta http-equiv="refresh" content="0; url=/marumanhwa/home/">
</head>
<body>
  <div id="loader">
    <div class="spinner"></div>
</div>
</body>
  <script>
window.addEventListener("load", () => {
    setTimeout(() => {
        document.getElementById("loader").classList.add("hide");
    }, 800); // Shows for 0.8 seconds
});
</script>
</html>
