<!DOCTYPE html>
<html>
<head>
<style>
body{
    margin:0;
    background:#0f0f0f;
}

#loader{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f0f0f;
}

.spinner{
    width:60px;
    height:60px;
    border:5px solid #333;
    border-top:5px solid #ff2e63;
    border-radius:50%;
    animation:spin .8s linear infinite;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div id="loader">
    <div class="spinner"></div>
</div>

<script>
setTimeout(() => {
    window.location.href="/marumanhwa/home/";
}, 300); // 1 second
</script>

</body>
</html>
