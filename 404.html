<style>
   *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}

body{
    background:#050505;
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
    padding:30px;
}

/* Center everything */
.container{
    position:relative;
    text-align:center;
    width:min(90vw,900px);
    z-index:2;
}

/* Pink glow behind image */
.glow{
    position:absolute;
    width:420px;
    height:420px;
    background:#ff2d8d;
    border-radius:50%;
    filter:blur(130px);
    opacity:.28;
    left:50%;
    top:180px;
    transform:translate(-50%,-50%);
    animation:pulse 5s ease-in-out infinite;
}

/* Image */
.hero{
    width:min(700px,100%);
    position:relative;
    z-index:2;
    animation:float 5s ease-in-out infinite;
    user-select:none;
    pointer-events:none;
}

/* Text */
h1{
    margin-top:20px;
    font-size:clamp(34px,4vw,50px);
}

p{
    margin:18px auto 35px;
    color:#a5a5a5;
    font-size:clamp(15px,2vw,19px);
    max-width:520px;
    line-height:1.7;
}

.btn{
    display:inline-block;
    padding:15px 40px;
    border-radius:999px;
    background:#ff2d8d;
    color:white;
    text-decoration:none;
    font-weight:600;
    transition:.35s;
    box-shadow:0 0 35px rgba(255,45,141,.35);
}

.btn:hover{
    transform:translateY(-4px);
    box-shadow:0 0 55px rgba(255,45,141,.7);
}

/* Floating animation */
@keyframes float{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-14px);
    }
}

/* Glow pulse */
@keyframes pulse{
    0%,100%{
        transform:translate(-50%,-50%) scale(1);
        opacity:.22;
    }

    50%{
        transform:translate(-50%,-50%) scale(1.12);
        opacity:.35;
    }
}
   .particles{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
}

.particles span{
    position:absolute;
    bottom:-30px;
    width:8px;
    height:8px;
    border-radius:50%;
    background:#ff2d8d;
    box-shadow:0 0 12px #ff2d8d;
    animation:rise linear infinite;
}

/* Random positions */
.particles span:nth-child(1){left:5%;animation-duration:8s;animation-delay:0s;}
.particles span:nth-child(2){left:14%;animation-duration:10s;animation-delay:2s;}
.particles span:nth-child(3){left:25%;animation-duration:12s;}
.particles span:nth-child(4){left:36%;animation-duration:9s;}
.particles span:nth-child(5){left:47%;animation-duration:11s;}
.particles span:nth-child(6){left:58%;animation-duration:8s;}
.particles span:nth-child(7){left:66%;animation-duration:10s;}
.particles span:nth-child(8){left:73%;animation-duration:12s;}
.particles span:nth-child(9){left:82%;animation-duration:9s;}
.particles span:nth-child(10){left:91%;animation-duration:11s;}
.particles span:nth-child(11){left:30%;animation-duration:13s;}
.particles span:nth-child(12){left:60%;animation-duration:14s;}

@keyframes rise{
    from{
        transform:translateY(0) scale(.3);
        opacity:0;
    }

    15%{
        opacity:1;
    }

    to{
        transform:translateY(-120vh) scale(1.3);
        opacity:0;
    }
}
</style>
<body>

<div class="particles"></div>

<div class="container">

    <div class="glow"></div>

    <img src="assets/404.PNG" class="hero" alt="404">

    <h1>Oops! Page not found</h1>

    <p>
        The page you're looking for doesn't exist or has been moved.
    </p>

    <a href="../home" class="btn">
        🏠 Go Home
    </a>

</div>
<div class="particles">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span>
</div>
</body>
