<style>
   *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}

body{
    background:#050505;
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
    padding:30px;
}

/* Center everything */
.container{
    position:relative;
    text-align:center;
    width:min(90vw,900px);
    z-index:2;
}

/* Pink glow behind image */
.glow{
    position:absolute;
    width:420px;
    height:420px;
    background:#ff2d8d;
    border-radius:50%;
    filter:blur(130px);
    opacity:.28;
    left:50%;
    top:180px;
    transform:translate(-50%,-50%);
    animation:pulse 5s ease-in-out infinite;
}

/* Image */
.hero{
    width:min(700px,100%);
    position:relative;
    z-index:2;
    animation:float 5s ease-in-out infinite;
    user-select:none;
    pointer-events:none;
}

/* Text */
h1{
    margin-top:20px;
    font-size:clamp(34px,4vw,50px);
}

p{
    margin:18px auto 35px;
    color:#a5a5a5;
    font-size:clamp(15px,2vw,19px);
    max-width:520px;
    line-height:1.7;
}

.btn{
    display:inline-block;
    padding:15px 40px;
    border-radius:999px;
    background:#ff2d8d;
    color:white;
    text-decoration:none;
    font-weight:600;
    transition:.35s;
    box-shadow:0 0 35px rgba(255,45,141,.35);
}

.btn:hover{
    transform:translateY(-4px);
    box-shadow:0 0 55px rgba(255,45,141,.7);
}

/* Floating animation */
@keyframes float{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-14px);
    }
}

/* Glow pulse */
@keyframes pulse{
    0%,100%{
        transform:translate(-50%,-50%) scale(1);
        opacity:.22;
    }

    50%{
        transform:translate(-50%,-50%) scale(1.12);
        opacity:.35;
    }
}.particles{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:0;
}

.particles span{
    position:absolute;
    left:var(--x);
    top:var(--y);

    width:var(--s);
    height:var(--s);

    border-radius:50%;
    background:#ff2d8d;

    box-shadow:
        0 0 8px #ff2d8d,
        0 0 16px #ff2d8d;

    opacity:.45;

    animation:drift var(--d) ease-in-out infinite alternate;
}

@keyframes drift{

    0%{
        transform:translate(0,0) scale(1);
    }

    25%{
        transform:translate(-8px,6px) scale(1.15);
    }

    50%{
        transform:translate(6px,-10px) scale(.9);
    }

    75%{
        transform:translate(-5px,-4px) scale(1.1);
    }

    100%{
        transform:translate(8px,8px) scale(1);
    }

}
</style>
<body>

<div class="particles">
    <span style="--x:5%;--y:12%;--s:4px;--d:6s;"></span>
    <span style="--x:18%;--y:35%;--s:3px;--d:8s;"></span>
    <span style="--x:32%;--y:20%;--s:5px;--d:7s;"></span>
    <span style="--x:48%;--y:60%;--s:4px;--d:9s;"></span>
    <span style="--x:65%;--y:15%;--s:3px;--d:6s;"></span>
    <span style="--x:82%;--y:40%;--s:5px;--d:8s;"></span>
    <span style="--x:92%;--y:72%;--s:4px;--d:10s;"></span>
    <span style="--x:12%;--y:80%;--s:5px;--d:7s;"></span>
    <span style="--x:40%;--y:88%;--s:3px;--d:6s;"></span>
    <span style="--x:73%;--y:83%;--s:4px;--d:9s;"></span>
</div>

<div class="container">

    <div class="glow"></div>

    <img src="/marumanhwa/assets/404.PNG" class="hero" alt="404">

    <h1>Oops! Page not found</h1>

    <p>
        The page you're looking for doesn't exist or has been moved.
    </p>

    <a href="/marumanhwa/index.html" class="btn">
        🏠 Go Home
    </a>

</div>
<div class="particles">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span>
</div>
</body>
