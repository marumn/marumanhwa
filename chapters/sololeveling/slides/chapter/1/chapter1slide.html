<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solo Leveling</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 15px;
    background:#1a1a1a;
    position:sticky;
    top:0;
    z-index:1000;
    border-bottom:1px solid rgba(255,46,99,.2);
}

.logo-wrap{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo-wrap img{
    width:32px;
    height:32px;
}

.logo{
    color:#ff2e63;
    font-weight:800;
    font-size:18px;
}

/* NAV BUTTONS */
.nav-buttons{
    display:flex;
    gap:10px;
}

.nav-buttons button{
    background:#242424;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
}

.nav-buttons button:hover{
    background:#333;
}

/* READER */
.reader{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.page{
    width:100%;
    margin-bottom:10px;
}

.page img{
    width:100%;
    display:block;
    border-radius:6px;
}

/* REACTIONS */
.section{
    padding:20px;
    max-width:900px;
    margin:auto;
}

.reactions button{
    background:#1a1a1a;
    border:1px solid #333;
    color:white;
    padding:10px 15px;
    margin-right:10px;
    border-radius:8px;
    cursor:pointer;
}

/* COMMENTS */
.comments input,
.comments textarea{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#1a1a1a;
    border:1px solid #333;
    color:white;
    border-radius:6px;
}

.comments textarea{
    height:100px;
    resize:none;
}

.post-btn{
    margin-top:10px;
    background:#ff2e63;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:6px;
    cursor:pointer;
}

.post-btn:hover{
    background:#ff4b7a;
}
.nav-btn{
    background:#242424;
    border:none;
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
    color:white;
    font-weight:600;
}

.nav-btn img{
    width:18px;
    height:18px;
}
    .login-btn{
    width:100%;
    max-width:900px;
    margin:20px auto;
    display:block;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#ff2e63;
    color:white;
    font-weight:700;
    cursor:pointer;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.75);
    backdrop-filter:blur(8px);
    z-index:9999;
}

.modal-box{
    width:85%;
    max-width:320px;
    background:#1a1a1a;
    border:1px solid rgba(255,46,99,.3);
    border-radius:16px;
    padding:20px;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

.modal-box h2{
    color:#ff2e63;
    text-align:center;
    margin-bottom:20px;
}

.modal-box input{
    width:100%;
    margin-bottom:12px;
    padding:12px;
    background:#0f0f0f;
    border:1px solid #333;
    color:white;
    border-radius:8px;
}

.auth-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#ff2e63;
    color:white;
    margin-top:10px;
    cursor:pointer;
}

.secondary{
    background:#242424;
}

#closeModal{
    float:right;
    font-size:24px;
    cursor:pointer;
}

#userPanel{
    max-width:900px;
    margin:15px auto;
    text-align:center;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
    <div class="logo-wrap">
        <img src="../../../../../assets/logo.png" alt="">
        <div class="logo">MARU MANHWA</div>
    </div>

    <div class="nav-buttons">
        <button onclick="history.back()">⬅ Back</button>
     <button onclick="prevChapter()" class="nav-btn">
    <img src="../../../../../assets/leftarrow.PNG" alt="">
    <span>Prev</span>
</button>

<button onclick="nextChapter()" class="nav-btn">
    <span>Next</span>
    <img src="../../../../../assets/rightarrow.PNG" alt="">
</button>
    </div>
</header>

<!-- READER (IMAGES) -->
<div class="reader" id="reader">

    <!-- Example images (you will replace dynamically or manually) -->
    <div class="page"><img src="../../../slidefiles/chapter1/solo-1-1.png"></div>
    <div class="page"><img src="../../../slidefiles/chapter1/solo-1-2.png"></div>
    <div class="page"><img src="covers/solo/solo-1-3.png"></div>

</div>

<!-- REACTIONS -->
<div class="section">
<h2>Reactions</h2>
<div class="reactions">
    <button>👍 10</button>
    <button>❤️ 0</button>
    <button>🔥 0</button>
</div>
</div>
<button id="openLoginBtn" class="login-btn">
  Login to Comment
</button>

<div id="loginModal" class="modal">

  <div class="modal-box">

    <span id="closeModal">&times;</span>

    <h2>MARU MANHWA</h2>

    <input id="username" type="text" placeholder="Username">

    <input id="email" type="email" placeholder="Email">

    <input id="password" type="password" placeholder="Password">

    <button onclick="loginUser()" class="auth-btn">
      Login
    </button>

    <button onclick="registerUser()" class="auth-btn secondary">
      Register
    </button>

  </div>

</div>

<div id="userPanel"></div>

<!-- COMMENTS -->
<div class="section comments">
<h2>Comments</h2>

<textarea id="commentInput"
placeholder="Write a comment..."></textarea>

<button class="post-btn"
onclick="postComment()">
  Post Comment
</button>

<div id="commentList"></div>

</div>

<script>
// chapter system (basic example)
let chapter = 1;

function nextChapter(){
    chapter++;
    alert("Go to chapter " + chapter);
    // later you will link: location.href = `solo-${chapter}.html`
}

function prevChapter(){
    if(chapter > 1){
        chapter--;
        alert("Go to chapter " + chapter);
    }
}
</script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

    import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBuSkc3-fGy0kHV2_D3eVNNYkFkG2LWnbg",
  authDomain: "maru-manhwa.firebaseapp.com",
  projectId: "maru-manhwa",
  storageBucket: "maru-manhwa.firebasestorage.app",
  messagingSenderId: "431200871834",
  appId: "1:431200871834:web:468b9b694099c87587c623"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
    const auth = getAuth(app);

    const chapterId = "solo-leveling-chapter-1";

window.postComment = async function() {

  if(!auth.currentUser){
    alert("Please login first.");
    return;
  }

  const userDoc = await getDoc(
  doc(db, "users", auth.currentUser.uid)
);

const name = userDoc.data().username;
  const comment = document.getElementById("commentInput").value;

  if (!comment.trim()) {
    alert("Please fill in both fields.");
    return;
  }

  await addDoc(collection(db, chapterId), {
    name,
    comment,
    time: Date.now()
  });

  document.getElementById("commentInput").value = "";
};

const q = query(
  collection(db, chapterId),
  orderBy("time", "desc")
);

onSnapshot(q, (snapshot) => {

  const commentList = document.getElementById("commentList");
  commentList.innerHTML = "";

  snapshot.forEach((doc) => {

    const data = doc.data();

    commentList.innerHTML += `
      <div style="
        background:#1a1a1a;
        border:1px solid #333;
        padding:12px;
        margin-top:10px;
        border-radius:8px;">
          <strong>${data.name}</strong>
          <p>${data.comment}</p>
      </div>
    `;
  });
});
    window.registerUser = async function(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try{
    await createUserWithEmailAndPassword(
      auth,
      email,
      password
    );
      const user = auth.currentUser;

await setDoc(
  doc(db, "users", user.uid),
  {
    username: document.getElementById("username").value
  }
);

    alert("Account created!");

  }catch(err){
    alert(err.message);
  }

}

window.loginUser = async function(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try{
    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

    alert("Logged in!");

  }catch(err){
    alert(err.message);
  }

}

window.logoutUser = async function(){

  await signOut(auth);

}

onAuthStateChanged(auth,(user)=>{

  const panel =
  document.getElementById("userPanel");

  const loginBtn =
  document.getElementById("openLoginBtn");

  if(user){

    loginBtn.style.display = "none";

    panel.innerHTML = `
      <div style="
        background:#1a1a1a;
        border:1px solid rgba(255,46,99,.3);
        padding:12px;
        border-radius:10px;
      ">
        👤 ${user.email}

        <br><br>

        <button
          onclick="logoutUser()"
          class="auth-btn">
          Logout
        </button>
      </div>
    `;

  }else{

    loginBtn.style.display = "block";

    panel.innerHTML = "";

  }

});
const modal =
document.getElementById("loginModal");

document
.getElementById("openLoginBtn")
.onclick = () => {

  modal.style.display = "block";

};

document
.getElementById("closeModal")
.onclick = () => {

  modal.style.display = "none";

};
</script>
</body>
</html>
